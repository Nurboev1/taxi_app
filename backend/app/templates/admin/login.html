<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SafarUz Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #123028;
      --ink-muted: #49695e;
      --line: #c8e0d6;
      --primary: #0f766e;
      --primary-2: #14b8a6;
      --danger: #a71d2a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(20, 184, 166, 0.25), transparent 36%),
        radial-gradient(circle at 85% 8%, rgba(15, 118, 110, 0.3), transparent 34%),
        linear-gradient(160deg, #edf9f4, #d7f0e6);
      padding: 14px;
    }

    .shell {
      width: min(94vw, 980px);
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid #b8dace;
      box-shadow: 0 30px 70px rgba(10, 61, 52, 0.2);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(6px);
    }

    .intro {
      padding: 34px;
      background:
        radial-gradient(circle at 10% 15%, rgba(255,255,255,0.4), transparent 46%),
        linear-gradient(145deg, #0f766e, #14b8a6);
      color: #ecfffb;
      position: relative;
      overflow: hidden;
    }

    .intro::after {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      right: -84px;
      bottom: -84px;
      background: rgba(255, 255, 255, 0.12);
      pointer-events: none;
    }

    .intro h1 {
      margin: 0;
      font-family: "Space Grotesk", "Manrope", sans-serif;
      font-size: 32px;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .intro p {
      margin: 14px 0 0;
      font-size: 14px;
      line-height: 1.5;
      max-width: 40ch;
      color: rgba(236, 255, 251, 0.9);
    }

    .form-wrap {
      padding: 30px;
      display: flex;
      align-items: center;
    }

    form {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
    }

    .form-title {
      margin: 0 0 6px;
      font-size: 24px;
      font-family: "Space Grotesk", "Manrope", sans-serif;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .form-sub {
      margin: 0 0 20px;
      color: var(--ink-muted);
      font-size: 14px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 700;
      font-size: 13px;
      color: var(--ink);
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      color: var(--ink);
      background: #fbfefd;
      transition: border-color .14s ease, box-shadow .14s ease;
    }

    input:focus {
      outline: 0;
      border-color: #1bb7a5;
      box-shadow: 0 0 0 3px rgba(27, 183, 165, 0.16);
    }

    button {
      margin-top: 18px;
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(15, 118, 110, 0.24);
      transition: transform .14s ease, opacity .14s ease;
    }

    button:hover { transform: translateY(-1px); opacity: 0.96; }

    .error {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #f2b8c0;
      color: var(--danger);
      background: #fff1f4;
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      .intro { padding: 20px; }
      .intro h1 { font-size: 27px; }
      .form-wrap { padding: 20px; }
      form { max-width: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="intro">
      <h1>SafarUz Admin</h1>
      <p>
        Operatsion monitoring, support ticketlar, xavfsizlik va admin account boshqaruvi bir panelda.
      </p>
    </section>

    <section class="form-wrap">
      <form method="post" action="/admin/login">
        <h2 class="form-title">Kirish</h2>
        <p class="form-sub">Davom etish uchun admin credential kiriting.</p>
        <label for="username">Login</label>
        <input id="username" type="text" name="username" autocomplete="username" required />
        <label for="password">Parol</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required />
        <button type="submit">Panelga kirish</button>
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
      </form>
    </section>
  </div>
</body>
</html>
